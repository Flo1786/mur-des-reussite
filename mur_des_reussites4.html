<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mur des réussites</title>
<style>
body { font-family: 'Nunito', sans-serif; background:#f7f3ee; color:#2c2416; min-height:100vh; margin:0; }
header { background:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ccc; }
.btn-trainer { cursor:pointer; padding:0.4rem 1rem; border-radius:20px; border:1px solid #ccc; background:transparent; }
.btn-trainer.active { background:#d47c3a; color:white; border-color:#d47c3a; }
.add-form { background:white; padding:1rem 2rem; margin:1rem 2rem; border-radius:12px; }
.wall { padding:1rem 2rem 3rem; columns:4 220px; column-gap:1rem; }
.note { break-inside:avoid; margin-bottom:1rem; padding:1rem; border-radius:10px; box-shadow:3px 4px 12px rgba(0,0,0,0.1); position:relative; transition:transform 0.2s; }
.note:hover { transform: translateY(-4px) rotate(0.5deg); }
.note-delete { position:absolute; top:0.2rem; right:0.2rem; display:none; cursor:pointer; background:#e74c3c; color:white; border:none; width:22px; height:22px; border-radius:50%; align-items:center; justify-content:center; font-weight:700; }
body.trainer-mode .note-delete { display:flex; }
#personal-count, #personal-streak { margin:0 2rem; font-weight:600; color:#5a8a5a; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); align-items:center; justify-content:center; }
.modal-overlay.visible { display:flex; }
.modal { background:white; padding:2rem; border-radius:12px; max-width:380px; width:90%; }
.color-dot { width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.2s, border-color 0.2s; }
.color-dot:hover { transform:scale(1.2); }
.color-dot.selected { border-color:#2c2416; transform:scale(1.15); }
</style>
</head>
<body>

<!-- Modal Formateur -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>🔐 Mode formateur</h3>
    <p>Entrez le mot de passe pour activer la gestion du mur.</p>
    <input type="password" id="pwd-input" placeholder="Mot de passe" maxlength="30"
      onkeydown="if(event.key==='Enter') checkPassword()"/>
    <div class="modal-error" id="pwd-error" style="color:#e74c3c; display:none;">Mot de passe incorrect.</div>
    <div style="margin-top:1rem; display:flex; justify-content:flex-end; gap:0.5rem;">
      <button onclick="closeModal()">Annuler</button>
      <button onclick="checkPassword()">Confirmer</button>
    </div>
  </div>
</div>

<header>
  <div>
    <h1>🌱 Mur des réussites</h1>
  </div>
  <div>
    <button class="btn-trainer" id="btn-trainer" onclick="toggleTrainerMode()">🔐 Formateur</button>
  </div>
</header>

<!-- Statistiques personnelles -->
<div id="personal-count"></div>
<div id="personal-streak"></div>

<!-- Formulaire ajout -->
<div class="add-form">
  <input type="text" id="input-name" placeholder="Ton prénom" maxlength="30"/>
  <textarea id="input-text" placeholder="Ma victoire..." maxlength="200" style="width:100%;height:60px;"></textarea>

  <!-- Sélecteur de couleur -->
  <div class="color-picker" style="margin-top:0.5rem; display:flex; gap:0.5rem; align-items:center;">
    <span style="font-size:0.85rem; font-weight:600; color:#8a7d6a;">Couleur :</span>
    <div class="color-dot selected" style="background:#fef3c7" data-color="#fef3c7" onclick="selectColor(this)"></div>
    <div class="color-dot" style="background:#d1fae5" data-color="#d1fae5" onclick="selectColor(this)"></div>
    <div class="color-dot" style="background:#dbeafe" data-color="#dbeafe" onclick="selectColor(this)"></div>
    <div class="color-dot" style="background:#fce7f3" data-color="#fce7f3" onclick="selectColor(this)"></div>
    <div class="color-dot" style="background:#ede9fe" data-color="#ede9fe" onclick="selectColor(this)"></div>
    <div class="color-dot" style="background:#fff7ed" data-color="#fff7ed" onclick="selectColor(this)"></div>
  </div>

  <div style="margin-top:0.5rem;">
    <button id="btn-add" onclick="addNote()">🌟 Publier ma victoire</button>
  </div>
</div>

<!-- Mur -->
<div class="wall" id="wall"></div>

<script>
const EMOJIS = ['🌟','💪','🎯','✨','🌱','🏆','🎉','💡','🔥','🌈','🦋','⭐','🌻','💛','🚀'];
const COLORS = ['#fef3c7','#d1fae5','#dbeafe','#fce7f3','#ede9fe','#fff7ed'];
const TEXT_COLORS = {'#fef3c7':'#78350f','#d1fae5':'#064e3b','#dbeafe':'#1e3a8a','#fce7f3':'#831843','#ede9fe':'#4c1d95','#fff7ed':'#7c2d12'};
const STORAGE_KEY = 'mur_reussites_indigo';
const TRAINER_PASSWORD = 'indigo2026';
let username = prompt("Quel est ton prénom ?") || "Anonyme";
let notes = [];
let trainerMode = false;
let selectedColor = COLORS[0];

// --- Chargement notes ---
function loadNotes() {
  const data = localStorage.getItem(STORAGE_KEY);
  notes = data ? JSON.parse(data) : [];
  renderAll();
}
function saveNotes() { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }

// --- Formateur ---
function toggleTrainerMode(){ trainerMode ? exitTrainerMode() : openModal(); }
function openModal(){ document.getElementById('modal-overlay').classList.add('visible'); document.getElementById('pwd-input').value=''; document.getElementById('pwd-error').style.display='none'; }
function closeModal(){ document.getElementById('modal-overlay').classList.remove('visible'); }
function checkPassword(){
  const val = document.getElementById('pwd-input').value;
  if(val===TRAINER_PASSWORD){ closeModal(); enterTrainerMode(); }
  else { document.getElementById('pwd-error').style.display='block'; }
}
function enterTrainerMode(){ trainerMode=true; document.body.classList.add('trainer-mode'); document.getElementById('btn-trainer').classList.add('active'); document.getElementById('btn-trainer').textContent='✅ Formateur'; renderAll(); }
function exitTrainerMode(){ trainerMode=false; document.body.classList.remove('trainer-mode'); document.getElementById('btn-trainer').classList.remove('active'); document.getElementById('btn-trainer').textContent='🔐 Formateur'; renderAll(); }

// --- Couleur ---
function selectColor(el){ document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected')); el.classList.add('selected'); selectedColor = el.dataset.color; }

// --- Ajouter note ---
function addNote(){
  const name=document.getElementById('input-name').value.trim();
  const text=document.getElementById('input-text').value.trim();
  if(!name || !text) return;
  const note = {
    id:Date.now(),
    user:username,
    name,
    text,
    emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
    color:selectedColor,
    date:new Date().toLocaleDateString('fr-FR'),
    rotate:(Math.random()*3-1.5).toFixed(1)
  };
  notes.unshift(note); saveNotes(); renderAll();
  document.getElementById('input-text').value=''; document.getElementById('input-name').value='';
}

// --- Supprimer note ---
function deleteNote(id){
  if(!trainerMode) return;
  if(!confirm('Supprimer cette victoire ?')) return;
  notes = notes.filter(n=>n.id!==id);
  saveNotes();
  renderAll();
}

// --- Affichage ---
function renderNote(note){
  const wall = document.getElementById('wall');
  const div=document.createElement('div'); div.className='note';
  div.style.background=note.color; div.style.color=TEXT_COLORS[note.color]||'#2c2416';
  div.style.transform=`rotate(${note.rotate}deg)`;
  div.innerHTML=`${trainerMode?`<button class="note-delete" onclick="deleteNote(${note.id})">✕</button>`:''}
  <div style="font-size:0.75rem;font-weight:700;margin-bottom:0.3rem;">${note.name}</div>
  <div style="font-size:1.6rem;margin-bottom:0.3rem;">${note.emoji}</div>
  <div style="font-family:'Caveat', cursive;font-size:1rem;line-height:1.4;">${note.text}</div>
  <div style="font-size:0.7rem;opacity:0.5;margin-top:0.5rem;text-align:right;">${note.date}</div>`;
  wall.appendChild(div);
}
function renderAll(){
  document.getElementById('wall').innerHTML='';
  const visibleNotes = trainerMode ? notes : notes.filter(n=>n.user===username);
  visibleNotes.forEach(renderNote);
  updatePersonalStats();
}

// --- Compteur et streak ---
function updatePersonalStats(){
  const myNotes = notes.filter(n=>n.user===username);
  const count = myNotes.length;
  let streak=0;
  const today = new Date();  
  const dates = myNotes.map(n=>new Date(n.date.split(" ").reverse().join(" "))).sort((a,b)=>b-a);
  let prevDate = today;
  for(let d of dates){
    const diff=Math.round((prevDate-d)/(1000*60*60*24));
    if(diff===0||diff===1){ streak++; prevDate=d; } else break;
  }
  document.getElementById('personal-count').textContent=`Tu as déjà ${count} réussite${count>1?'s':''} 🎉`;
  document.getElementById('personal-streak').textContent=`${streak} jour${streak>1?'s':''} consécutif${streak>1?'s':''} 💪`;
}

// --- Initialisation ---
loadNotes();
</script>
</body>
</html>
