<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Quest — Escape Game MBTI &amp; CPS</title>
  <script src="scorm_api.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #a78bfa;
      gap: 16px;
    }

    #loading .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(167, 139, 250, 0.2);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading p {
      font-size: 1rem;
      opacity: 0.8;
    }

    #game-frame {
      display: none;
      width: 100%;
      height: 100vh;
      border: none;
    }

    #completion-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #7c3aed, #0891b2);
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 0.875rem;
      font-weight: 600;
      z-index: 9999;
      box-shadow: 0 2px 12px rgba(124, 58, 237, 0.5);
    }
  </style>
</head>
<body>

  <!-- Bannière de complétion SCORM -->
  <div id="completion-banner">
    ✅ Votre progression a été enregistrée dans Moodle.
  </div>

  <!-- Écran de chargement -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Chargement de Neon Quest…</p>
  </div>

  <!-- Iframe du jeu -->
  <iframe
    id="game-frame"
    src="https://mbtiescape-d85dqzcs.manus.space"
    allow="fullscreen"
    title="Neon Quest — Escape Game MBTI & CPS"
  ></iframe>

  <script>
    var gameFrame = document.getElementById('game-frame');
    var loading = document.getElementById('loading');
    var banner = document.getElementById('completion-banner');

    // Afficher le jeu une fois chargé
    gameFrame.addEventListener('load', function () {
      loading.style.display = 'none';
      gameFrame.style.display = 'block';
    });

    // Écouter la complétion envoyée par le jeu
    window.addEventListener('message', function (event) {
      if (!event.data || typeof event.data !== 'object') return;
      if (event.data.type === 'NEON_QUEST_COMPLETE') {
        // Afficher la bannière de confirmation
        banner.style.display = 'block';
        setTimeout(function () {
          banner.style.display = 'none';
        }, 5000);
      }
    });
  </script>

</body>
</html>
